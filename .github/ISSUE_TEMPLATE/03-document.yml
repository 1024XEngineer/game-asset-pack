name: Documentation
description: Add, correct, or improve project documentation.
title: "[Docs]: "
body:
  - type: markdown
    attributes:
      value: |
        Documentation work also requires clear context, a defined goal, controlled scope, and acceptance criteria.
  - type: textarea
    id: background
    attributes:
      label: Context and current state
      description: What is missing, incorrect, outdated, or difficult to understand in the current documentation?
    validations:
      required: true
  - type: textarea
    id: goal
    attributes:
      label: Documentation goal and audience
      description: Which readers should be able to complete what task or understand what content?
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope and exclusions
      description: Which documents, sections, or examples are included? State what this work will not cover.
    validations:
      required: true
  - type: textarea
    id: acceptance_criteria
    attributes:
      label: Acceptance criteria
      description: How will a reader use the documentation to reach the goal? List checkable completion conditions.
    validations:
      required: true
  - type: textarea
    id: references
    attributes:
      label: References (optional)
      description: Provide existing documentation, related issues, examples, or external links.
